<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Battle of the Books Practice Quiz for Shiloh Point Elementary School, Standard 28 Book List for Grades 4-6."
    />
    <meta name="theme-color" content="#1d4ed8" />
    <title>Battle of the Books Practice Quiz</title>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              lagoon: "#1d4ed8",
              seafoam: "#14b8a6",
              sunshine: "#facc15",
              coral: "#fb7185",
              mint: "#86efac",
              ink: "#15304f",
              paper: "#fffdf6",
            },
            boxShadow: {
              floaty: "0 20px 50px rgba(21, 48, 79, 0.14)",
              sticker: "0 12px 24px rgba(29, 78, 216, 0.16)",
            },
            borderRadius: {
              "4xl": "2rem",
            },
          },
        },
      };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      :root {
        --paper: #fffdf6;
        --ink: #15304f;
        --sky: #dbeafe;
        --lagoon: #1d4ed8;
        --seafoam: #14b8a6;
        --sunshine: #facc15;
        --coral: #fb7185;
        --mint: #86efac;
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        font-family: "Trebuchet MS", "Avenir Next", "Gill Sans", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(134, 239, 172, 0.55), transparent 24rem),
          radial-gradient(circle at top right, rgba(250, 204, 21, 0.5), transparent 22rem),
          radial-gradient(circle at bottom left, rgba(20, 184, 166, 0.28), transparent 20rem),
          linear-gradient(180deg, #f8fbff 0%, #eef8ff 42%, #fffdf6 100%);
      }

      button,
      input,
      label,
      summary,
      a {
        -webkit-tap-highlight-color: transparent;
      }

      button:focus-visible,
      input:focus-visible,
      a:focus-visible,
      summary:focus-visible {
        outline: 3px solid #1d4ed8;
        outline-offset: 3px;
      }

      .title-font {
        font-family: "Trebuchet MS", "Gill Sans", sans-serif;
        letter-spacing: 0.02em;
      }

      .bubble-card {
        background: rgba(255, 253, 246, 0.94);
        backdrop-filter: blur(8px);
        border: 2px solid rgba(255, 255, 255, 0.9);
      }

      .hero-cta {
        background-color: var(--lagoon);
        background: linear-gradient(90deg, #1d4ed8 0%, #14b8a6 100%);
        color: #ffffff;
        box-shadow: 0 12px 24px rgba(29, 78, 216, 0.18);
      }

      .primary-button {
        background-color: var(--lagoon);
        background: linear-gradient(90deg, var(--lagoon) 0%, var(--seafoam) 100%);
        color: #ffffff;
        box-shadow: 0 12px 24px rgba(29, 78, 216, 0.18);
      }

      .primary-button:hover:not(:disabled) {
        transform: translateY(-3px);
      }

      .primary-button:disabled {
        background: #e2e8f0;
        color: #64748b;
        box-shadow: none;
        cursor: not-allowed;
      }

      .secondary-button {
        background: #ffffff;
        border: 2px solid rgba(148, 163, 184, 0.34);
        color: #334155;
      }

      .secondary-button:hover:not(:disabled) {
        transform: translateY(-2px);
        border-color: rgba(100, 116, 139, 0.48);
      }

      .secondary-accent-button {
        background: #ffffff;
        border: 2px solid rgba(29, 78, 216, 0.18);
        color: var(--lagoon);
      }

      .secondary-accent-button:hover:not(:disabled) {
        transform: translateY(-2px);
        border-color: rgba(29, 78, 216, 0.38);
        background: rgba(219, 234, 254, 0.32);
      }

      .book-toggle-card {
        border: 2px solid rgba(226, 232, 240, 0.95);
        background: rgba(255, 255, 255, 0.92);
        color: var(--ink);
      }

      .book-toggle-card:hover {
        transform: translateY(-2px);
        border-color: rgba(29, 78, 216, 0.32);
      }

      .book-toggle-card-active {
        background-color: #dbeafe;
        background-image: linear-gradient(135deg, #dbeafe 0%, #ccfbf1 100%);
        border-color: rgba(29, 78, 216, 0.55);
        color: var(--ink);
        box-shadow: 0 12px 24px rgba(29, 78, 216, 0.12);
      }

      .book-toggle-card-active:hover {
        border-color: rgba(29, 78, 216, 0.68);
      }

      .book-toggle-author-active {
        color: #1e3a5f;
      }

      .book-toggle-on {
        background: var(--lagoon);
        color: #ffffff;
      }

      .count-choice {
        border: 2px solid rgba(29, 78, 216, 0.18);
        background: #ffffff;
        color: var(--lagoon);
      }

      .count-choice:hover {
        transform: translateY(-2px);
        border-color: rgba(29, 78, 216, 0.36);
      }

      .count-choice-active {
        background-color: var(--lagoon);
        background-image: linear-gradient(90deg, var(--lagoon) 0%, var(--seafoam) 100%);
        border-color: transparent;
        color: #ffffff;
        box-shadow: 0 12px 24px rgba(29, 78, 216, 0.16);
      }

      .option-button {
        border: 2px solid #e2e8f0;
        background: #ffffff;
        color: var(--ink);
      }

      .option-button:hover:not(:disabled) {
        transform: translateY(-2px);
        border-color: rgba(29, 78, 216, 0.32);
      }

      .option-button-selected {
        border-color: var(--lagoon);
        background: #eff6ff;
      }

      .option-button-correct {
        border-color: #34d399;
        background: #ecfdf5;
      }

      .option-button-wrong {
        border-color: #fb7185;
        background: #fff1f2;
      }

      .sticker {
        box-shadow: 0 14px 26px rgba(29, 78, 216, 0.15);
        transform: rotate(-2deg);
      }

      .wiggle {
        animation: wiggle 4.8s ease-in-out infinite;
      }

      .floaty {
        animation: floaty 5s ease-in-out infinite;
      }

      .pop-in {
        animation: popin 0.28s ease-out both;
      }

      .confetti-piece {
        position: fixed;
        top: -12px;
        width: 12px;
        height: 18px;
        border-radius: 999px;
        opacity: 0.95;
        animation: confetti-fall 950ms linear forwards;
        z-index: 60;
      }

      .question-scroll::-webkit-scrollbar {
        width: 10px;
      }

      .question-scroll::-webkit-scrollbar-thumb {
        background: rgba(29, 78, 216, 0.22);
        border-radius: 999px;
      }

      .quiz-status-sticky {
        position: sticky;
        top: 0.75rem;
        z-index: 25;
      }

      .quiz-progress-fill {
        width: var(--target-width, 0%);
        animation: progress-grow 420ms ease-out both;
      }

      @keyframes wiggle {
        0%,
        100% {
          transform: rotate(-2deg) translateY(0px);
        }
        50% {
          transform: rotate(1deg) translateY(-4px);
        }
      }

      @keyframes floaty {
        0%,
        100% {
          transform: translateY(0px);
        }
        50% {
          transform: translateY(-8px);
        }
      }

      @keyframes popin {
        from {
          opacity: 0;
          transform: translateY(10px) scale(0.98);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      @keyframes confetti-fall {
        0% {
          transform: translateY(0) rotate(0deg);
        }
        100% {
          transform: translateY(110vh) rotate(520deg);
          opacity: 0.1;
        }
      }

      @keyframes progress-grow {
        from {
          width: 0%;
        }
        to {
          width: var(--target-width, 0%);
        }
      }
    </style>
  </head>
  <body>
    <div
      aria-hidden="true"
      class="pointer-events-none fixed inset-0 overflow-hidden"
    >
      <div class="absolute left-[-4rem] top-12 h-28 w-28 rounded-full bg-mint/40 blur-2xl"></div>
      <div class="absolute right-[-2rem] top-24 h-36 w-36 rounded-full bg-sunshine/30 blur-2xl"></div>
      <div class="absolute bottom-[-4rem] left-1/3 h-40 w-40 rounded-full bg-seafoam/20 blur-3xl"></div>
    </div>

    <div id="confetti-root" aria-hidden="true"></div>
    <div id="app" class="relative z-10"></div>

    <script src="./book_question_bank.js"></script>
    <script>
      (() => {
        const STORAGE_KEYS = {
          selectedBooks: "botb_selected_books_v3",
          questionCount: "botb_question_count_v3",
          difficultyMode: "botb_difficulty_mode_v1",
          missHistory: "botb_missed_questions_v1",
          quizSession: "botb_quiz_session_v2",
        };
        const WRONG_ANSWER_LOCK_MS = 10000;

        const ALL_BOOK_IDS = bookCatalog.map((book) => book.id);
        const DEFAULT_BOOKS = [];
        const BOOK_ICON_MAP = {
          "the-very-very-far-north": "🐻‍❄️",
          "the-terrible-two": "🐄",
          "whoosh-lonnie-johnsons-super-soaking-stream-of-inventions": "💦",
          "el-deafo": "🦻",
          "book-scavenger": "🔎",
          "seven-wonders-of-sassafras-springs": "✨",
          "gregor-the-overlander": "🦇",
          "the-way-to-rio-luna": "🌙",
          "ruby-holler": "🏕️",
          "bud-not-buddy": "🎷",
          "dragons-in-a-bag": "🐉",
          "dog-squad": "🐶",
          "the-million-dollar-shot": "🏀",
          found: "🛩️",
          "the-detectives-assistant": "🕵️",
          "full-of-beans": "🫘",
          "regarding-the-fountain": "⛲",
          restart: "🔁",
          "pie-in-the-sky": "🥧",
          savvy: "⚡",
          "where-the-mountain-meets-the-moon": "🐲",
          glitch: "🤖",
          "snow-treasure": "❄️",
          "becoming-muhammad-ali": "🥊",
          "the-camping-trip-that-changed-america": "🏕️",
          "harry-potter-and-the-sorcerers-stone": "🪄",
          "night-of-the-twisters": "🌪️",
          "dealing-with-dragons": "🐲",
        };
        const DIFFICULTY_MODES = {
          practice: {
            label: "Practice",
            shortLabel: "Practice",
            description: "Balanced mix with friendlier answer choices.",
            preferredKinds: [
              "detail-from-book",
              "story-book",
              "author-from-detail",
              "author-from-title",
              "book-from-author",
              "detail-not-in-book",
            ],
            replayMisses: false,
            smartDistractors: false,
          },
          challenge: {
            label: "Challenge",
            shortLabel: "Challenge",
            description: "Harder clue questions, look-alike choices, and missed-clue replay.",
            preferredKinds: [
              "detail-not-in-book",
              "author-from-detail",
              "detail-from-book",
              "book-from-author",
              "story-book",
              "author-from-title",
            ],
            replayMisses: true,
            smartDistractors: true,
          },
          expert: {
            label: "Expert",
            shortLabel: "Expert",
            description: "Mostly indirect clue questions with the toughest distractors.",
            preferredKinds: [
              "detail-not-in-book",
              "author-from-detail",
              "detail-from-book",
              "book-from-author",
            ],
            replayMisses: true,
            smartDistractors: true,
          },
        };
        const DEFAULT_DIFFICULTY_MODE = "challenge";

        const app = document.getElementById("app");
        const confettiRoot = document.getElementById("confetti-root");
        const bookMap = new Map(bookCatalog.map((book) => [book.id, book]));
        const bookTagMap = typeof BOOK_TAGS === "object" && BOOK_TAGS ? BOOK_TAGS : {};
        let feedbackUnlockTimerId = null;
        let audioContext = null;

        const state = {
          view: "home",
          selectedBookIds: loadSelectedBooks(),
          questionCountInput: loadQuestionCount(),
          difficultyMode: loadDifficultyMode(),
          quizQuestions: [],
          currentQuestionIndex: 0,
          selectedAnswer: "",
          submitted: false,
          correctCount: 0,
          quizResults: [],
          feedbackUnlockUntil: 0,
          missedQuestionCounts: loadMissHistory(),
        };

        hydrateStateFromSavedSession();
        normalizePreferences();

        app.addEventListener("click", handleClick);
        app.addEventListener("change", handleChange);
        app.addEventListener("input", handleInput);
        window.addEventListener("pagehide", persistAppState);
        document.addEventListener("visibilitychange", handleVisibilityChange);

        render();

        function loadSelectedBooks() {
          try {
            const raw = localStorage.getItem(STORAGE_KEYS.selectedBooks);
            const parsed = raw ? JSON.parse(raw) : null;
            if (!Array.isArray(parsed)) return [...DEFAULT_BOOKS];
            const valid = parsed.filter((id) => bookMap.has(id));
            return valid.length ? valid : [...DEFAULT_BOOKS];
          } catch (error) {
            return [...DEFAULT_BOOKS];
          }
        }

        function loadQuestionCount() {
          try {
            const raw = localStorage.getItem(STORAGE_KEYS.questionCount);
            return raw && /^\d+$/.test(raw) ? raw : "10";
          } catch (error) {
            return "10";
          }
        }

        function loadDifficultyMode() {
          try {
            const raw = localStorage.getItem(STORAGE_KEYS.difficultyMode);
            return raw && DIFFICULTY_MODES[raw] ? raw : DEFAULT_DIFFICULTY_MODE;
          } catch (error) {
            return DEFAULT_DIFFICULTY_MODE;
          }
        }

        function loadMissHistory() {
          try {
            const raw = localStorage.getItem(STORAGE_KEYS.missHistory);
            const parsed = raw ? JSON.parse(raw) : null;
            if (!parsed || typeof parsed !== "object") return {};
            return Object.fromEntries(
              Object.entries(parsed).filter(
                ([questionId, count]) => typeof questionId === "string" && Number.isFinite(count) && count > 0
              )
            );
          } catch (error) {
            return {};
          }
        }

        function loadSavedQuizSession() {
          try {
            const raw = localStorage.getItem(STORAGE_KEYS.quizSession);
            const parsed = raw ? JSON.parse(raw) : null;
            if (!parsed || typeof parsed !== "object") return null;

            const selectedBookIds = Array.isArray(parsed.selectedBookIds)
              ? parsed.selectedBookIds.filter((id) => bookMap.has(id))
              : [];
            const quizQuestions = Array.isArray(parsed.quizQuestions)
              ? parsed.quizQuestions.filter(isValidSavedQuestion)
              : [];
            const quizResults = Array.isArray(parsed.quizResults)
              ? parsed.quizResults.filter((result) => result && typeof result === "object")
              : [];
            const questionCountInput =
              typeof parsed.questionCountInput === "string" && /^\d*$/.test(parsed.questionCountInput)
                ? parsed.questionCountInput
                : "10";
            const difficultyMode =
              typeof parsed.difficultyMode === "string" && DIFFICULTY_MODES[parsed.difficultyMode]
                ? parsed.difficultyMode
                : loadDifficultyMode();
            const currentQuestionIndex = Number.isInteger(parsed.currentQuestionIndex)
              ? parsed.currentQuestionIndex
              : 0;
            const correctCount = Number.isInteger(parsed.correctCount) ? parsed.correctCount : 0;
            const selectedAnswer =
              typeof parsed.selectedAnswer === "string" ? parsed.selectedAnswer : "";
            const submitted = Boolean(parsed.submitted);
            const feedbackUnlockUntil =
              Number.isFinite(parsed.feedbackUnlockUntil) && parsed.feedbackUnlockUntil > Date.now()
                ? parsed.feedbackUnlockUntil
                : 0;
            const view =
              typeof parsed.view === "string" &&
              ["home", "setup", "quiz", "results", "review"].includes(parsed.view)
                ? parsed.view
                : "quiz";

            if (!quizQuestions.length) return null;

            return {
              view,
              selectedBookIds,
              questionCountInput,
              difficultyMode,
              quizQuestions,
              currentQuestionIndex: Math.min(
                Math.max(currentQuestionIndex, 0),
                quizQuestions.length - 1
              ),
              selectedAnswer,
              submitted,
              correctCount: Math.max(correctCount, 0),
              quizResults,
              feedbackUnlockUntil,
            };
          } catch (error) {
            return null;
          }
        }

        function isValidSavedQuestion(question) {
          return (
            question &&
            typeof question === "object" &&
            typeof question.id === "string" &&
            typeof question.bookId === "string" &&
            bookMap.has(question.bookId) &&
            typeof question.question === "string" &&
            typeof question.answer === "string" &&
            typeof question.author === "string" &&
            Array.isArray(question.options) &&
            question.options.length >= 2
          );
        }

        function hydrateStateFromSavedSession() {
          const savedSession = loadSavedQuizSession();
          if (!savedSession) return;

          state.view = savedSession.view;
          state.selectedBookIds = savedSession.selectedBookIds;
          state.questionCountInput = savedSession.questionCountInput;
          state.difficultyMode = savedSession.difficultyMode;
          state.quizQuestions = savedSession.quizQuestions;
          state.currentQuestionIndex = savedSession.currentQuestionIndex;
          state.selectedAnswer = savedSession.selectedAnswer;
          state.submitted = savedSession.submitted;
          state.correctCount = savedSession.correctCount;
          state.quizResults = savedSession.quizResults;
          state.feedbackUnlockUntil = savedSession.feedbackUnlockUntil;
          ensureFeedbackUnlockTimer();
        }

        function persistPreferences() {
          try {
            localStorage.setItem(
              STORAGE_KEYS.selectedBooks,
              JSON.stringify(state.selectedBookIds)
            );
            if (state.questionCountInput) {
              localStorage.setItem(
                STORAGE_KEYS.questionCount,
                state.questionCountInput
              );
            }
            localStorage.setItem(STORAGE_KEYS.difficultyMode, state.difficultyMode);
          } catch (error) {
            // Ignore localStorage issues in locked-down browsers.
          }
        }

        function persistAppState() {
          persistPreferences();
          try {
            if (!state.quizQuestions.length) {
              localStorage.removeItem(STORAGE_KEYS.quizSession);
              return;
            }
            localStorage.setItem(
              STORAGE_KEYS.quizSession,
              JSON.stringify({
                view: state.view,
                selectedBookIds: state.selectedBookIds,
                questionCountInput: state.questionCountInput,
                difficultyMode: state.difficultyMode,
                quizQuestions: state.quizQuestions,
                currentQuestionIndex: state.currentQuestionIndex,
                selectedAnswer: state.selectedAnswer,
                submitted: state.submitted,
                correctCount: state.correctCount,
                quizResults: state.quizResults,
                feedbackUnlockUntil: state.feedbackUnlockUntil,
              })
            );
          } catch (error) {
            // Ignore localStorage issues in locked-down browsers.
          }
        }

        function persistMissHistory() {
          try {
            localStorage.setItem(
              STORAGE_KEYS.missHistory,
              JSON.stringify(state.missedQuestionCounts)
            );
          } catch (error) {
            // Ignore localStorage issues in locked-down browsers.
          }
        }

        function getMissCount(questionId) {
          return state.missedQuestionCounts[questionId] || 0;
        }

        function recordMiss(question) {
          if (!question?.id) return;
          state.missedQuestionCounts = {
            ...state.missedQuestionCounts,
            [question.id]: getMissCount(question.id) + 1,
          };
          persistMissHistory();
        }

        function handleVisibilityChange() {
          if (document.visibilityState === "hidden") {
            persistAppState();
          }
        }

        function getDifficultyConfig(mode = state.difficultyMode) {
          return DIFFICULTY_MODES[mode] || DIFFICULTY_MODES[DEFAULT_DIFFICULTY_MODE];
        }

        function normalizePreferences() {
          if (!DIFFICULTY_MODES[state.difficultyMode]) {
            state.difficultyMode = DEFAULT_DIFFICULTY_MODE;
          }
          const maxQuestions = getAvailableQuestions().length;
          const requested = parseCountInput(state.questionCountInput);
          if (!requested && maxQuestions > 0) {
            state.questionCountInput = maxQuestions >= 10 ? "10" : String(maxQuestions);
          }
          if (requested > maxQuestions && maxQuestions > 0) {
            state.questionCountInput = String(maxQuestions);
          }
          if (maxQuestions === 0) {
            state.questionCountInput = "";
          }
          persistPreferences();
        }

        function handleClick(event) {
          const trigger = event.target.closest("[data-action]");
          if (!trigger) return;

          const action = trigger.dataset.action;
          primeAudioContext();

          if (action === "go-home") {
            setView("home");
            return;
          }

          if (action === "go-setup") {
            setView("setup");
            return;
          }

          if (action === "start-from-home") {
            setView("setup");
            return;
          }

          if (action === "resume-quiz") {
            setView(getResumeTargetView(), { scroll: false });
            return;
          }

          if (action === "toggle-book") {
            toggleBook(trigger.dataset.bookId);
            return;
          }

          if (action === "select-all-books") {
            state.selectedBookIds = [...ALL_BOOK_IDS];
            normalizePreferences();
            persistPreferences();
            render();
            return;
          }

          if (action === "clear-all-books") {
            state.selectedBookIds = [];
            normalizePreferences();
            persistPreferences();
            render();
            return;
          }

          if (action === "set-difficulty") {
            const nextMode = trigger.dataset.mode;
            if (!DIFFICULTY_MODES[nextMode]) return;
            state.difficultyMode = nextMode;
            normalizePreferences();
            persistPreferences();
            render();
            return;
          }

          if (action === "set-count") {
            state.questionCountInput = trigger.dataset.count || "";
            persistPreferences();
            render();
            return;
          }

          if (action === "begin-quiz") {
            if (!canBeginQuiz()) return;
            startQuiz();
            return;
          }

          if (action === "submit-answer") {
            submitCurrentAnswer();
            return;
          }

          if (action === "select-answer") {
            if (state.submitted) return;
            state.selectedAnswer = trigger.dataset.answer || "";
            render();
            return;
          }

          if (action === "next-question") {
            if (getContinuationLockRemainingMs() > 0) return;
            goToNextQuestion();
            return;
          }

          if (action === "see-results") {
            if (getContinuationLockRemainingMs() > 0) return;
            setView("results");
            return;
          }

          if (action === "restart-quiz") {
            startQuiz();
            return;
          }

          if (action === "review-selected-books") {
            setView(state.selectedBookIds.length ? "review" : "setup");
            return;
          }
        }

        function handleChange(event) {
          primeAudioContext();
          const answerInput = event.target.closest('input[name="answer-choice"]');
          if (answerInput && !state.submitted) {
            state.selectedAnswer = answerInput.value;
            render();
          }
        }

        function handleInput(event) {
          const countInput = event.target.closest('[data-role="question-count-input"]');
          if (!countInput) return;
          const maxDigits = String(Math.max(questionBank.length, 1)).length;
          const digitsOnly = countInput.value.replace(/[^\d]/g, "").slice(0, maxDigits);
          state.questionCountInput = digitsOnly;
          const maxQuestions = getAvailableQuestions().length;
          const requested = parseCountInput(digitsOnly);
          if (requested > maxQuestions && maxQuestions > 0) {
            state.questionCountInput = String(maxQuestions);
          }
          persistPreferences();
          render();
        }

        function setView(view, options = {}) {
          state.view = view;
          render();
          if (options.scroll !== false) {
            window.scrollTo({ top: 0, behavior: "smooth" });
          }
        }

        function toggleBook(bookId) {
          if (!bookMap.has(bookId)) return;
          if (state.selectedBookIds.includes(bookId)) {
            state.selectedBookIds = state.selectedBookIds.filter((id) => id !== bookId);
          } else {
            state.selectedBookIds = [...state.selectedBookIds, bookId];
          }
          normalizePreferences();
          persistPreferences();
          render();
        }

        function getSelectedBooks() {
          return bookCatalog.filter((book) => state.selectedBookIds.includes(book.id));
        }

        function getBookTags(bookId) {
          return bookTagMap[bookId] || [];
        }

        function getSharedBookTagScore(firstBookId, secondBookId) {
          const firstTags = new Set(getBookTags(firstBookId));
          return getBookTags(secondBookId).reduce(
            (score, tag) => score + (firstTags.has(tag) ? 1 : 0),
            0
          );
        }

        function getRelatedBookIds(bookId) {
          const selectedIds = new Set(state.selectedBookIds);
          return bookCatalog
            .filter((book) => book.id !== bookId)
            .sort((firstBook, secondBook) => {
              const firstSelected = selectedIds.has(firstBook.id) ? 1 : 0;
              const secondSelected = selectedIds.has(secondBook.id) ? 1 : 0;
              if (secondSelected !== firstSelected) return secondSelected - firstSelected;

              const firstScore = getSharedBookTagScore(bookId, firstBook.id);
              const secondScore = getSharedBookTagScore(bookId, secondBook.id);
              if (secondScore !== firstScore) return secondScore - firstScore;

              return firstBook.title.localeCompare(secondBook.title);
            })
            .map((book) => book.id);
        }

        function isQuestionAllowed(question, mode = state.difficultyMode) {
          const selectedCount = state.selectedBookIds.length;
          const questionKind = getQuestionKind(question);

          if (selectedCount === 1 && questionKind === "story-book") return false;

          if (mode === "challenge" && selectedCount <= 2 && questionKind === "story-book") {
            return false;
          }

          if (mode === "expert" && ["story-book", "author-from-title"].includes(questionKind)) {
            return false;
          }

          return true;
        }

        function getAvailableQuestions(mode = state.difficultyMode) {
          return questionBank.filter(
            (question) =>
              state.selectedBookIds.includes(question.bookId) &&
              isQuestionAllowed(question, mode)
          );
        }

        function getQuestionAnswerType(question) {
          return question?.answerType || "book";
        }

        function getQuestionKind(question) {
          return question?.questionKind || "story-book";
        }

        function getCanonicalStoryDetails(bookId) {
          return questionBank
            .filter(
              (question) =>
                question.bookId === bookId &&
                getQuestionKind(question) === "story-book"
            )
            .map((question) => question.explanation);
        }

        function getQuestionContextText(question) {
          const book = bookMap.get(question.bookId);
          if (!book) return "";
          if (getQuestionKind(question) === "detail-not-in-book") {
            return `Does not belong in ${book.title}`;
          }
          if (getQuestionAnswerType(question) === "detail") {
            return `from ${book.title} by ${book.author}`;
          }
          if (getQuestionAnswerType(question) === "author") {
            return `Author of ${book.title}`;
          }
          return `by ${book.author}`;
        }

        function hasSavedQuiz() {
          return state.quizQuestions.length > 0;
        }

        function getResumeTargetView() {
          if (!hasSavedQuiz()) return "setup";
          if (state.view === "results" || state.view === "review") return state.view;
          if (state.currentQuestionIndex >= state.quizQuestions.length - 1 && state.submitted) {
            return "results";
          }
          return "quiz";
        }

        function parseCountInput(value) {
          return Number.parseInt(value || "", 10) || 0;
        }

        function getRequestedQuestionCount() {
          const max = getAvailableQuestions().length;
          const requested = parseCountInput(state.questionCountInput);
          return requested > 0 ? Math.min(requested, max) : 0;
        }

        function canBeginQuiz() {
          const max = getAvailableQuestions().length;
          const requested = parseCountInput(state.questionCountInput);
          return state.selectedBookIds.length > 0 && requested >= 1 && requested <= max;
        }

        function startQuiz() {
          const requested = getRequestedQuestionCount();
          const chosenQuestions = pickQuizQuestions(getAvailableQuestions(), requested).map((question) => ({
            ...question,
            options: buildAnswerOptions(question),
          }));

          state.quizQuestions = chosenQuestions;
          state.currentQuestionIndex = 0;
          state.selectedAnswer = "";
          state.submitted = false;
          state.correctCount = 0;
          state.quizResults = [];
          state.feedbackUnlockUntil = 0;
          clearFeedbackUnlockTimer();
          state.view = "quiz";
          render();
          window.scrollTo({ top: 0, behavior: "smooth" });
        }

        function getQuestionPriority(question, mode = state.difficultyMode) {
          const preferredKinds = getDifficultyConfig(mode).preferredKinds;
          const kindIndex = preferredKinds.indexOf(getQuestionKind(question));
          const kindScore = kindIndex === -1 ? 0 : preferredKinds.length - kindIndex;
          const missedScore = mode === "practice" ? 0 : Math.min(getMissCount(question.id), 3) * 4;
          return kindScore * 10 + missedScore;
        }

        function pickBestQuestionForGroup(questions, bookUsage, mode = state.difficultyMode) {
          if (!questions.length) return null;

          let bestIndex = 0;
          let bestScore = -Infinity;

          questions.forEach((question, index) => {
            const usagePenalty = (bookUsage.get(question.bookId) || 0) * 6;
            const score =
              getQuestionPriority(question, mode) -
              usagePenalty +
              Math.random();

            if (score > bestScore) {
              bestScore = score;
              bestIndex = index;
            }
          });

          return questions.splice(bestIndex, 1)[0] || null;
        }

        function pickQuizQuestions(availableQuestions, requested) {
          if (requested <= 0) return [];

          const preferredKinds = getDifficultyConfig().preferredKinds;
          const grouped = new Map();
          shuffle(availableQuestions).forEach((question) => {
            const key = getQuestionKind(question);
            if (!grouped.has(key)) grouped.set(key, []);
            grouped.get(key).push(question);
          });

          const orderedKinds = [
            ...preferredKinds,
            ...Array.from(grouped.keys()).filter((kind) => !preferredKinds.includes(kind)),
          ];

          const picked = [];
          const usedIds = new Set();
          const bookUsage = new Map();

          while (picked.length < requested) {
            let addedThisRound = false;

            for (const kind of orderedKinds) {
              const group = grouped.get(kind);
              if (!group?.length || picked.length >= requested) continue;
              const nextQuestion = pickBestQuestionForGroup(group, bookUsage);
              if (!nextQuestion || usedIds.has(nextQuestion.id)) continue;
              picked.push(nextQuestion);
              usedIds.add(nextQuestion.id);
              bookUsage.set(nextQuestion.bookId, (bookUsage.get(nextQuestion.bookId) || 0) + 1);
              addedThisRound = true;
            }

            if (!addedThisRound) break;
          }

          if (picked.length < requested) {
            shuffle(availableQuestions)
              .sort(
                (firstQuestion, secondQuestion) =>
                  getQuestionPriority(secondQuestion) - getQuestionPriority(firstQuestion)
              )
              .forEach((question) => {
                if (picked.length >= requested || usedIds.has(question.id)) return;
                picked.push(question);
                usedIds.add(question.id);
              });
          }

          return picked;
        }

        function uniqueChoices(items) {
          return Array.from(new Set(items.filter(Boolean)));
        }

        function getRelatedBookChoices(question, mapBookToChoice) {
          return uniqueChoices(
            getRelatedBookIds(question.bookId).map((bookId) => {
              const book = bookMap.get(bookId);
              return book ? mapBookToChoice(book) : null;
            })
          );
        }

        function getAllBookChoices(mapBookToChoice) {
          return uniqueChoices(bookCatalog.map((book) => mapBookToChoice(book)));
        }

        function getRelatedDetailChoices(question) {
          return uniqueChoices(
            getRelatedBookIds(question.bookId).flatMap((bookId) => getCanonicalStoryDetails(bookId))
          );
        }

        function buildChoiceSet(answer, choicePools) {
          const distractorSet = new Set();

          choicePools.forEach((pool) => {
            shuffle(pool).forEach((choice) => {
              if (choice === answer || distractorSet.size >= 3) return;
              distractorSet.add(choice);
            });
          });

          return shuffle([answer, ...Array.from(distractorSet).slice(0, 3)]);
        }

        function buildDetailNotInBookOptions(question) {
          const sameBookDetails = getCanonicalStoryDetails(question.bookId).filter(
            (detail) => detail !== question.answer
          );
          return buildChoiceSet(question.answer, [
            sameBookDetails,
            getRelatedDetailChoices(question),
          ]);
        }

        function buildAnswerOptions(question) {
          if (getQuestionKind(question) === "detail-not-in-book") {
            return buildDetailNotInBookOptions(question);
          }

          const smartDistractors = getDifficultyConfig().smartDistractors;
          const answerType = getQuestionAnswerType(question);
          let preferredPool = [];
          let selectedPool = [];
          let allPool = [];

          if (answerType === "author") {
            if (smartDistractors) {
              preferredPool = getRelatedBookChoices(question, (book) => book.author);
            }
            selectedPool = uniqueChoices(getSelectedBooks().map((book) => book.author));
            allPool = getAllBookChoices((book) => book.author);
          } else if (answerType === "detail") {
            if (smartDistractors) {
              preferredPool = getRelatedDetailChoices(question);
            }
            selectedPool = uniqueChoices(
              state.selectedBookIds
                .filter((bookId) => bookId !== question.bookId)
                .flatMap((bookId) => getCanonicalStoryDetails(bookId))
            );
            allPool = uniqueChoices(
              bookCatalog
                .filter((book) => book.id !== question.bookId)
                .flatMap((book) => getCanonicalStoryDetails(book.id))
            );
          } else {
            if (smartDistractors) {
              preferredPool = getRelatedBookChoices(question, (book) => book.title);
            }
            selectedPool = uniqueChoices(getSelectedBooks().map((book) => book.title));
            allPool = getAllBookChoices((book) => book.title);
          }

          return buildChoiceSet(question.answer, [preferredPool, selectedPool, allPool]);
        }

        function submitCurrentAnswer() {
          if (state.submitted || !state.selectedAnswer) return;
          const question = getCurrentQuestion();
          if (!question) return;

          const isCorrect = state.selectedAnswer === question.answer;
          if (isCorrect) {
            state.correctCount += 1;
            fireConfetti();
            playCorrectSound();
            state.feedbackUnlockUntil = 0;
            clearFeedbackUnlockTimer();
          } else {
            recordMiss(question);
            playWrongSound();
            state.feedbackUnlockUntil = Date.now() + WRONG_ANSWER_LOCK_MS;
            ensureFeedbackUnlockTimer();
            maybeQueueMissReplay(question);
          }

          state.quizResults[state.currentQuestionIndex] = {
            questionId: question.id,
            bookId: question.bookId,
            question: question.question,
            answer: question.answer,
            author: question.author,
            answerType: getQuestionAnswerType(question),
            questionKind: getQuestionKind(question),
            explanation: question.explanation,
            sources: question.sources,
            selectedAnswer: state.selectedAnswer,
            isCorrect,
            replayOf: question.replayOf || "",
          };

          state.submitted = true;
          render();
        }

        function goToNextQuestion() {
          if (!state.submitted) return;
          if (getContinuationLockRemainingMs() > 0) return;
          if (state.currentQuestionIndex >= state.quizQuestions.length - 1) {
            setView("results");
            return;
          }
          state.currentQuestionIndex += 1;
          state.selectedAnswer = "";
          state.submitted = false;
          state.feedbackUnlockUntil = 0;
          clearFeedbackUnlockTimer();
          render();
        }

        function maybeQueueMissReplay(question) {
          if (!getDifficultyConfig().replayMisses || question?.replayOf) return;

          const usedIds = new Set(state.quizQuestions.map((candidate) => candidate.id));
          const replayCandidates = getAvailableQuestions()
            .filter(
              (candidate) =>
                candidate.bookId === question.bookId &&
                !usedIds.has(candidate.id) &&
                getQuestionKind(candidate) !== "story-book"
            )
            .sort(
              (firstQuestion, secondQuestion) =>
                getQuestionPriority(secondQuestion) - getQuestionPriority(firstQuestion)
            );

          const replayQuestion = replayCandidates[0];
          if (!replayQuestion) return;

          const insertionIndex = Math.min(state.currentQuestionIndex + 3, state.quizQuestions.length);
          state.quizQuestions.splice(insertionIndex, 0, {
            ...replayQuestion,
            options: buildAnswerOptions(replayQuestion),
            replayOf: question.id,
          });
        }

        function getCurrentQuestion() {
          return state.quizQuestions[state.currentQuestionIndex] || null;
        }

        function shuffle(items) {
          const array = [...items];
          for (let i = array.length - 1; i > 0; i -= 1) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
          }
          return array;
        }

        function fireConfetti() {
          const colors = ["#1d4ed8", "#14b8a6", "#facc15", "#fb7185", "#86efac"];
          const pieces = 24;

          for (let index = 0; index < pieces; index += 1) {
            const piece = document.createElement("span");
            piece.className = "confetti-piece";
            piece.style.left = `${Math.random() * 100}%`;
            piece.style.background = colors[index % colors.length];
            piece.style.animationDelay = `${Math.random() * 160}ms`;
            piece.style.transform = `translateY(0) rotate(${Math.random() * 90}deg)`;
            confettiRoot.appendChild(piece);
            window.setTimeout(() => piece.remove(), 1200);
          }
        }

        function clearFeedbackUnlockTimer() {
          if (feedbackUnlockTimerId) {
            window.clearInterval(feedbackUnlockTimerId);
            feedbackUnlockTimerId = null;
          }
        }

        function getContinuationLockRemainingMs() {
          return Math.max(0, state.feedbackUnlockUntil - Date.now());
        }

        function ensureFeedbackUnlockTimer() {
          clearFeedbackUnlockTimer();
          const remaining = getContinuationLockRemainingMs();
          if (remaining <= 0) {
            state.feedbackUnlockUntil = 0;
            updateContinuationCountdownUi();
            return;
          }
          updateContinuationCountdownUi();
          feedbackUnlockTimerId = window.setInterval(() => {
            const currentRemaining = getContinuationLockRemainingMs();
            if (currentRemaining <= 0) {
              state.feedbackUnlockUntil = 0;
              clearFeedbackUnlockTimer();
              updateContinuationCountdownUi();
              persistAppState();
              return;
            }
            updateContinuationCountdownUi();
          }, 250);
        }

        function getAudioContext() {
          if (audioContext) return audioContext;
          const AudioCtor = window.AudioContext || window.webkitAudioContext;
          if (!AudioCtor) return null;
          audioContext = new AudioCtor();
          return audioContext;
        }

        function unlockAudioContext() {
          const context = getAudioContext();
          if (!context) return Promise.resolve(null);
          if (context.state === "running") return Promise.resolve(context);
          return context
            .resume()
            .then(() => context)
            .catch(() => null);
        }

        function primeAudioContext() {
          const context = getAudioContext();
          if (!context || context.state === "running") return;
          context.resume().catch(() => null);
        }

        function playTone(context, { frequency, startTime, duration, type = "sine", volume = 0.08 }) {
          const oscillator = context.createOscillator();
          const gainNode = context.createGain();
          oscillator.type = type;
          oscillator.frequency.setValueAtTime(frequency, startTime);
          gainNode.gain.setValueAtTime(0.0001, startTime);
          gainNode.gain.exponentialRampToValueAtTime(volume, startTime + 0.02);
          gainNode.gain.exponentialRampToValueAtTime(0.0001, startTime + duration);
          oscillator.connect(gainNode);
          gainNode.connect(context.destination);
          oscillator.start(startTime);
          oscillator.stop(startTime + duration + 0.03);
        }

        function playCorrectSound() {
          unlockAudioContext().then((context) => {
            if (!context) return;
            const start = context.currentTime + 0.01;
            playTone(context, {
              frequency: 740,
              startTime: start,
              duration: 0.14,
              type: "triangle",
              volume: 0.12,
            });
            playTone(context, {
              frequency: 988,
              startTime: start + 0.15,
              duration: 0.2,
              type: "triangle",
              volume: 0.14,
            });
          });
        }

        function playWrongSound() {
          unlockAudioContext().then((context) => {
            if (!context) return;
            const start = context.currentTime + 0.01;
            playTone(context, {
              frequency: 300,
              startTime: start,
              duration: 0.2,
              type: "square",
              volume: 0.08,
            });
            playTone(context, {
              frequency: 196,
              startTime: start + 0.14,
              duration: 0.28,
              type: "square",
              volume: 0.08,
            });
          });
        }

        function updateContinuationCountdownUi() {
          const button = app.querySelector('[data-role="continuation-button"]');
          const note = app.querySelector('[data-role="continuation-note"]');
          if (!button) return;

          const remainingMs = getContinuationLockRemainingMs();
          const countdown = Math.max(0, Math.ceil(remainingMs / 1000));
          const baseLabel = button.dataset.baseLabel || button.textContent.trim();

          if (remainingMs > 0) {
            button.disabled = true;
            button.textContent = `${baseLabel} (${countdown})`;
            if (note) {
              note.hidden = false;
              note.textContent = `Read the explanation, then the next question unlocks in ${countdown} second${countdown === 1 ? "" : "s"}.`;
            }
            return;
          }

          button.disabled = false;
          button.textContent = baseLabel;
          if (note) {
            note.hidden = true;
          }
        }

              <div class="bubble-card rounded-[2rem] border border-white/80 p-6 shadow-floaty sm:p-8">

                <p class="mt-2 text-base text-slate-700">

                <div class="mt-5 flex flex-wrap gap-3">
                  ${
                    quickCounts.length
                      ? quickCounts
                          .map((count) => {

                            const label =

                              (count > 20 || ![5, 10, 15, 20].includes(count))
                              ? `Max ${count}`
                              : `${count}`;
                            return `
                              <button

        function renderQuiz() {
          const question = getCurrentQuestion();
          if (!question) {
            return `
              <section class="bubble-card rounded-[2rem] border border-white/80 p-6 shadow-floaty sm:p-8">

                <button
                  data-action="go-setup"

                >
                  Go to Setup
                </button>
              </section>
            `;
          }

          const total = state.quizQuestions.length;
          const currentNumber = state.currentQuestionIndex + 1;
          const difficultyConfig = getDifficultyConfig();
          const answeredCount = state.submitted
            ? state.currentQuestionIndex + 1
            : state.currentQuestionIndex;
          const progressPercent = total ? Math.round((answeredCount / total) * 100) : 0;
          const sourceLinks = renderSourceLinks(question.sources);
          const currentResult = state.quizResults[state.currentQuestionIndex];
          const continuationLockRemainingMs = getContinuationLockRemainingMs();
          const continuationDisabled =
            Boolean(state.submitted && currentResult && !currentResult.isCorrect) &&
            continuationLockRemainingMs > 0;
          const continuationLabel = currentNumber === total ? "See Results" : "Next Question";
          const continuationCountdown = Math.ceil(continuationLockRemainingMs / 1000);

          return `
            <section class="space-y-6">
              <div class="quiz-status-sticky">
                <div class="bubble-card rounded-[1.6rem] border border-white/80 px-4 py-4 shadow-floaty sm:px-5">
                  <div class="flex flex-col gap-4 lg:flex-row lg:items-center lg:justify-between">
                    <div class="min-w-0 flex-1">
                      <div class="flex flex-wrap items-center gap-2">
                        <span class="inline-flex items-center rounded-full bg-lagoon/10 px-3 py-1.5 text-xs font-black uppercase tracking-wide text-lagoon sm:text-sm">
                          Question ${currentNumber} of ${total}
                        </span>
                        <span class="inline-flex items-center rounded-full bg-emerald-100 px-3 py-1.5 text-xs font-black uppercase tracking-wide text-emerald-900 sm:text-sm">
                          Score: ${state.correctCount} correct
                        </span>
                        <span class="inline-flex items-center rounded-full bg-sky-100 px-3 py-1.5 text-xs font-black uppercase tracking-wide text-sky-900 sm:text-sm">
                          Answered: ${answeredCount}
                        </span>
                        <span class="inline-flex items-center rounded-full bg-coral/15 px-3 py-1.5 text-xs font-black uppercase tracking-wide text-rose-900 sm:text-sm">
                          ${escapeHtml(difficultyConfig.shortLabel)}
                        </span>
                      </div>
                      <div class="mt-3 flex items-center gap-3">
                        <div class="h-3 flex-1 overflow-hidden rounded-full bg-slate-200">
                          <div
                            class="quiz-progress-fill h-full rounded-full bg-gradient-to-r from-lagoon via-seafoam to-sunshine"
                            style="--target-width: ${progressPercent}%"
                            role="progressbar"
                            aria-valuemin="0"
                            aria-valuemax="100"
                            aria-valuenow="${progressPercent}"
                            aria-label="Quiz progress"
                          ></div>
                        </div>
                        <span class="shrink-0 text-sm font-black text-slate-600">${progressPercent}%</span>
                      </div>
                    </div>
                    <div class="rounded-[1.2rem] bg-white/85 px-4 py-3 shadow-sm">
                      <p class="text-xs font-black uppercase tracking-wide text-slate-500">
                        Studying now
                      </p>
                      <p class="mt-1 text-sm font-black text-ink sm:text-base">
                        ${state.selectedBookIds.length} book${state.selectedBookIds.length === 1 ? "" : "s"} selected
                      </p>
                      <p class="mt-1 text-xs font-semibold text-slate-600">
                        Saved automatically on this device
                      </p>
                    </div>
                  </div>
                </div>
              </div>

              <div class="bubble-card rounded-[2rem] border border-white/80 p-6 shadow-floaty sm:p-8">
                  <div class="rounded-[1.8rem] bg-white px-5 py-5 sm:px-7 sm:py-7">
                  <div class="flex items-start gap-3">
                    <div class="sticker flex h-12 w-12 shrink-0 items-center justify-center rounded-2xl bg-gradient-to-br from-sunshine to-coral text-2xl">
                      ${state.submitted ? getBookIcon(question.bookId) : "❓"}
                    </div>
                    <div>
                      <div class="flex flex-wrap items-center gap-2">
                        <p class="text-sm font-black uppercase tracking-[0.24em] text-lagoon">
                          Question

                        ${
                          question.replayOf
                            ? `
                          <span class="inline-flex items-center rounded-full bg-amber-100 px-3 py-1 text-xs font-black uppercase tracking-wide text-amber-900">

                            : ""
                        }
                      </div>
                      <h2 class="mt-2 text-2xl font-black leading-tight text-ink sm:text-3xl">
                        ${escapeHtml(question.question)}
                      </h2>
                    </div>
                  </div>

                  <fieldset class="mt-8">
                    <legend class="sr-only">Choose your answer</legend>
                    <div class="grid gap-4" role="radiogroup" aria-label="Answer choices">
                      ${question.options
                        .map((option, index) => renderOptionCard(option, index, question.answer))
                        .join("")}
                    </div>
                  </fieldset>

                  <div class="mt-8 flex flex-col gap-3 sm:flex-row">
                    <button
                      data-action="submit-answer"
                      ${state.selectedAnswer && !state.submitted ? "" : "disabled"}
                      class="primary-button min-h-[58px] rounded-full px-8 py-4 text-lg font-black transition"
                    >
                      Submit Answer
                    </button>
                    ${
                      state.submitted
                        ? `
                      <button
                        data-action="${currentNumber === total ? "see-results" : "next-question"}"
                        data-role="continuation-button"
                        data-base-label="${continuationLabel}"
                        ${continuationDisabled ? "disabled" : ""}
                        class="secondary-accent-button min-h-[58px] rounded-full px-8 py-4 text-lg font-black transition"
                      >
                        ${continuationDisabled ? `${continuationLabel} (${continuationCountdown})` : continuationLabel}
                      </button>
                    `
                        : ""
                    }
                  </div>
                  ${
                    state.submitted
                      ? `
                    <p
                      data-role="continuation-note"
                      ${continuationDisabled ? "" : "hidden"}
                      class="mt-3 text-sm font-semibold text-rose-700"
                    >

                    state.submitted

                              : "text-rose-900"

                          </p>
                          <p class="mt-2 text-lg font-black text-ink">
                            ${escapeHtml(question.answer)}
                          </p>
                          <p class="mt-1 text-sm font-bold text-slate-600">
                            ${escapeHtml(getQuestionContextText(question))}
                          </p>
                        </div>
                        <div class="rounded-3xl bg-white/90 px-4 py-3 text-sm font-bold text-slate-700 shadow-sm">

                          <span class="text-ink">${escapeHtml(state.selectedAnswer)}</span>

                    </div>

                      : ""
                  }
                </div>
              </div>
            </section>
          `;
        }

        function renderOptionCard(option, index, correctAnswer) {
          const isSelected = state.selectedAnswer === option;
          const isCorrect = option === correctAnswer;
          const revealCorrect = state.submitted && isCorrect;
          const revealWrong = state.submitted && isSelected && !isCorrect;
          const currentQuestion = getCurrentQuestion();
          const isDetailAnswer = getQuestionAnswerType(currentQuestion) === "detail";

          let cardClass = "option-button";
          let badge = "";

          if (!state.submitted && isSelected) {
            cardClass = "option-button option-button-selected";
            badge = `<span class="rounded-full bg-sky-100 px-3 py-1 text-xs font-black uppercase tracking-wide text-sky-900">Selected</span>`;
          }

          if (revealCorrect) {
            cardClass = "option-button option-button-correct";
            badge = `<span class="rounded-full bg-emerald-200 px-3 py-1 text-xs font-black uppercase tracking-wide text-emerald-900">Correct answer</span>`;
          }

          if (revealWrong) {
            cardClass = "option-button option-button-wrong";
            badge = `<span class="rounded-full bg-rose-200 px-3 py-1 text-xs font-black uppercase tracking-wide text-rose-900">Your pick</span>`;
          }

          return `
            <button
              type="button"
              role="radio"
              aria-checked="${isSelected}"
              aria-label="Answer choice ${String.fromCharCode(65 + index)}: ${escapeAttribute(option)}"
              data-action="select-answer"
              data-answer="${escapeAttribute(option)}"
              ${state.submitted ? "disabled" : ""}
              class="flex min-h-[86px] w-full items-center justify-between gap-4 rounded-[1.6rem] border-2 px-5 py-4 text-left text-base font-black text-ink transition ${cardClass} ${state.submitted ? "cursor-default" : "cursor-pointer"}"
            >
              <span class="flex items-center gap-4">
                <span class="flex h-10 w-10 items-center justify-center rounded-2xl bg-slate-100 text-sm font-black text-slate-700">
                  ${String.fromCharCode(65 + index)}
                </span>
                <span class="${isDetailAnswer ? "text-sm leading-6 sm:text-base" : ""}">${escapeHtml(option)}</span>
              </span>
              ${badge}
            </button>
          `;
        }

        function renderResults() {
          const total = state.quizQuestions.length;
          const percent = total ? Math.round((state.correctCount / total) * 100) : 0;
          const selectedBooks = getSelectedBooks();
          const difficultyConfig = getDifficultyConfig();

          return `
            <section class="space-y-6">
              <div class="bubble-card rounded-[2rem] border border-white/80 p-6 shadow-floaty sm:p-8">

                    <p class="text-sm font-black uppercase tracking-[0.24em] text-white/85">
                      Final score
                    </p>
                    <p class="mt-3 text-5xl font-black">${state.correctCount}/${total}</p>
                    <p class="mt-2 text-lg font-black">${percent}% correct</p>
                  </div>
                  <div>
                    <h2 class="title-font text-3xl font-black text-ink sm:text-4xl">
                      ${getScoreHeadline(percent)}
                    </h2>
                    <p class="mt-3 text-lg leading-8 text-slate-700">
                      You got ${state.correctCount} out of ${total} correct. ${getScoreMessage(percent)}
                    </p>
                    <p class="mt-3 inline-flex items-center rounded-full bg-coral/15 px-4 py-2 text-sm font-black text-rose-900">
                      Difficulty: ${escapeHtml(difficultyConfig.label)}
                    </p>
                    <div class="mt-5">
                      <p class="text-sm font-black uppercase tracking-[0.24em] text-slate-500">
                        Books in this quiz
                      </p>
                      <div class="mt-3 flex flex-wrap gap-2">
                        ${selectedBooks
                          .map(
                            (book) => `
                              <span class="inline-flex items-center rounded-full bg-white px-4 py-2 text-sm font-black text-ink shadow-sm">
                                ${getBookIcon(book.id)} ${escapeHtml(book.title)}
                              </span>
                            `
                          )
                          .join("")}
                      </div>
                    </div>
                  </div>
                </div>
                <div class="mt-8 flex flex-col gap-3 sm:flex-row">
                  <button
                    data-action="restart-quiz"
                    class="primary-button min-h-[58px] rounded-full px-8 py-4 text-lg font-black transition"
                  >
                    Restart Quiz
                  </button>
                  <button
                    data-action="go-setup"
                    class="secondary-button min-h-[58px] rounded-full px-8 py-4 text-lg font-black transition"
                  >
                    Try a New Setup
                  </button>
                  <button
                    data-action="review-selected-books"
                    class="secondary-button min-h-[58px] rounded-full px-8 py-4 text-lg font-black transition"

                    Review All Selected Books
                  </button>
                </div>
              </div>

                  <div>
                    <h3 class="text-2xl font-black text-ink">Quiz review</h3>
                    <p class="mt-2 text-base text-slate-700">

                </div>

                <div class="question-scroll mt-6 grid gap-4">
                  ${state.quizResults
                    .map((result, index) => {
                      const book = bookMap.get(result.bookId);
                      return `
                        <article class="rounded-[1.6rem] bg-white px-5 py-5 shadow-sm">
                          <div class="flex flex-col gap-3 sm:flex-row sm:items-start sm:justify-between">
                            <div>
                              <div class="flex flex-wrap items-center gap-2">
                                <span class="inline-flex items-center rounded-full px-3 py-1 text-xs font-black uppercase tracking-wide ${
                                  result.isCorrect
                                    ? "bg-emerald-100 text-emerald-900"
                                    : "bg-rose-100 text-rose-900"
                                }">
                                  ${result.isCorrect ? "Correct" : "Keep practicing"}
                                </span>
                                ${
                                  result.replayOf
                                    ? `
                                  <span class="inline-flex items-center rounded-full bg-amber-100 px-3 py-1 text-xs font-black uppercase tracking-wide text-amber-900">
                                    Second look
                                  </span>
                                `
                                    : ""
                                }
                                <span class="text-sm font-black text-slate-500">
                                  Question ${index + 1}
                                </span>
                              </div>
                              <p class="mt-3 text-lg font-black text-ink">
                                ${escapeHtml(result.question)}
                              </p>
                              <p class="mt-3 text-sm font-semibold text-slate-600">
                                Your answer: <span class="font-black text-ink">${escapeHtml(result.selectedAnswer)}</span>
                              </p>
                              <p class="mt-1 text-sm font-semibold text-slate-600">
                                Correct answer: <span class="font-black text-ink">${escapeHtml(result.answer)}</span>
                                ${getQuestionContextText(result)
                                  ? `<span class="text-slate-500"> • ${escapeHtml(getQuestionContextText(result))}</span>`
                                  : ""}
                              </p>
                            </div>
                            <div class="text-3xl">${book ? getBookIcon(book.id) : "📚"}</div>
                          </div>
                          <p class="mt-4 text-base leading-7 text-slate-700">
                            ${escapeHtml(result.explanation)}
                          </p>
                          <div class="mt-4 text-sm font-semibold text-slate-600">
                            <span class="font-black text-slate-700">Source:</span>
                            ${renderSourceLinks(result.sources)}
                          </div>
                        </article>
                      `;
                    })
                    .join("")}
                </div>
              </div>
            </section>
          `;
        }

        function renderReview() {
          const selectedBooks = getSelectedBooks();
          const grouped = selectedBooks
            .map((book) => ({
              book,
              questions: questionBank.filter((question) => question.bookId === book.id),
            }))
            .filter((group) => group.questions.length > 0);

          return `
            <section class="space-y-6">
              <div class="bubble-card rounded-[2rem] border border-white/80 p-6 shadow-floaty sm:p-8">
                <div class="flex flex-col gap-5 lg:flex-row lg:items-center lg:justify-between">
                  <div>
                    <p class="text-sm font-black uppercase tracking-[0.24em] text-lagoon">
                      Review mode
                    </p>
                    <h2 class="title-font mt-2 text-3xl font-black text-ink sm:text-4xl">
                      Study all of your selected books in one place.
                    </h2>
                    <p class="mt-3 max-w-3xl text-base leading-7 text-slate-700 sm:text-lg">
                      Scroll by book, read the question prompts, and use the explanations as quick study clues.
                    </p>
                  </div>
                  <div class="flex flex-wrap gap-3">
                    <span class="inline-flex items-center rounded-full bg-lagoon/10 px-4 py-2 text-sm font-black text-lagoon">
                      ${selectedBooks.length} selected book${selectedBooks.length === 1 ? "" : "s"}
                    </span>
                    <span class="inline-flex items-center rounded-full bg-emerald-100 px-4 py-2 text-sm font-black text-emerald-900">
                      ${getAvailableQuestions().length} question clues
                    </span>
                  </div>
                </div>
                <div class="mt-8 flex flex-col gap-3 sm:flex-row">
                  <button
                    data-action="go-setup"
                    class="primary-button min-h-[56px] rounded-full px-8 py-4 text-lg font-black transition"
                  >
                    Choose Books
                  </button>
                  <button
                    data-action="restart-quiz"
                    ${
                      canBeginQuiz() ? "" : "disabled"
                    }
                    class="secondary-accent-button min-h-[56px] rounded-full px-8 py-4 text-lg font-black transition disabled:cursor-not-allowed disabled:border-slate-200 disabled:bg-slate-100 disabled:text-slate-400"
                  >
                    Start Quiz With These Books
                  </button>
                </div>
              </div>

              <div class="space-y-5">
                ${
                  grouped.length
                    ? grouped
                        .map(
                          (group) => `
                      <section class="bubble-card rounded-[2rem] border border-white/80 p-6 shadow-floaty sm:p-8">
                        <div class="flex items-start gap-4">
                          <div class="sticker flex h-14 w-14 shrink-0 items-center justify-center rounded-3xl bg-gradient-to-br from-lagoon to-seafoam text-3xl text-white">
                            ${getBookIcon(group.book.id)}
                          </div>
                          <div class="min-w-0">
                            <h3 class="text-2xl font-black text-ink">
                              ${escapeHtml(group.book.title)}
                            </h3>
                            <p class="mt-1 text-sm font-semibold text-slate-600">
                              ${escapeHtml(group.book.author)}
                            </p>
                          </div>
                        </div>
                        <div class="mt-6 grid gap-4">
                          ${group.questions
                            .map(
                              (question, index) => `
                                <article class="rounded-[1.6rem] bg-white px-5 py-5 shadow-sm">
                                  <div class="flex flex-wrap items-center gap-3">
                                    <span class="inline-flex items-center rounded-full bg-sky-100 px-3 py-1 text-xs font-black uppercase tracking-wide text-sky-900">
                                      Question clue ${index + 1}
                                    </span>
                                    <span class="inline-flex items-center rounded-full bg-slate-100 px-3 py-1 text-xs font-black uppercase tracking-wide text-slate-700">
                                      ${escapeHtml(question.evidenceLevel)} confidence
                                    </span>
                                  </div>
                                  <p class="mt-3 text-lg font-black text-ink">
                                    ${escapeHtml(question.question)}
                                  </p>
                                  <p class="mt-4 text-base leading-7 text-slate-700">
                                    ${escapeHtml(question.explanation)}
                                  </p>
                                  <div class="mt-4 text-sm font-semibold text-slate-600">
                                    <span class="font-black text-slate-700">Source:</span>
                                    ${renderSourceLinks(question.sources)}
                                  </div>
                                </article>
                              `
                            )
                            .join("")}
                        </div>
                      </section>
                    `
                        )
                        .join("")
                    : `
                      <section class="bubble-card rounded-[2rem] border border-white/80 p-6 shadow-floaty sm:p-8">
                        <div class="rounded-[1.8rem] border border-amber-200 bg-amber-50 px-5 py-5 text-amber-950">
                          <p class="text-xl font-black">Pick a few books to unlock review mode.</p>
                          <p class="mt-2 text-base leading-7 text-amber-900">
                            Once you choose books in setup, this page will show all of their question clues and explanations.
                          </p>
                          <button
                            data-action="go-setup"
                            class="primary-button mt-5 min-h-[52px] rounded-full px-6 py-3 text-base font-black"
                          >
                            Choose Books
                          </button>
                        </div>
                      </section>
                    `
                }
              </div>
            </section>
          `;
        }

        function renderSourceLinks(sources) {
          if (!sources || !sources.length) return "Source note not available";
          return sources
            .map((source) => {
              const label = formatSourceLabel(source);
              return `<a class="font-black text-lagoon underline decoration-lagoon/30 underline-offset-2" href="${escapeAttribute(
                source
              )}" target="_blank" rel="noreferrer">${escapeHtml(label)}</a>`;
            })
            .join('<span class="mx-2 text-slate-400">•</span>');
        }

        function formatSourceLabel(url) {
          try {
            const parsed = new URL(url);
            return parsed.hostname.replace(/^www\./, "");
          } catch (error) {
            return url;
          }
        }

        function getScoreHeadline(percent) {
          if (percent >= 90) return "Book-battle superstar!";
          if (percent >= 75) return "Strong reading memory!";
          if (percent >= 55) return "Nice job growing your quiz power!";
          return "Good practice today!";
        }

        function getScoreMessage(percent) {
          if (percent >= 90) {
            return "You remembered a lot of important details. That is tournament-ready practice.";
          }
          if (percent >= 75) {
            return "You are building strong recall. A little more review can push you even higher.";
          }
          if (percent >= 55) {
            return "You are learning the hot spots. Review the explanations and try again.";
          }
          return "Each round helps your brain notice more details. Read the review cards and give it another try.";
        }

        function getBookIcon(bookId) {
          return BOOK_ICON_MAP[bookId] || "📚";
        }

        function escapeHtml(value) {
          return String(value)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#39;");
        }

        function escapeAttribute(value) {
          return escapeHtml(value).replace(/`/g, "&#96;");
        }
      })();
    </script>
  </body>
</html>
